 <header>

  <img src="images/pink logo.png" alt="ModoFrame Logo" class="modoframe-logo" />

      <a href="index.html">About</a>

  <style>
    

    

    h1 {
      text-align: center;
      color: #ff4c60;
      margin-bottom: 40px;
      font-size: 42px;
      animation: fadeIn 1s ease-in-out;
    }

    .section {
      margin-bottom: 60px;
      animation: slideIn 0.8s ease-in-out;
    }

    .section h2 {
      color: #ff4c60;
      margin-bottom: 20px;
      font-size: 28px;
      border-left: 4px solid #ff4c60;
      padding-left: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .grid img,
    .grid video {
      width: 100%;
      border-radius: 10px;
      object-fit: cover;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .grid img:hover,
    .grid video:hover {
      transform: scale(1.03);
      box-shadow: 0 8px 20px rgba(255, 76, 96, 0.4);
    }

    a.back-link {
      display: inline-block;
      margin-bottom: 30px;
      color: #ff4c60;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      transition: color 0.3s ease;
    }

    a.back-link:hover {
      color: #ffffff;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>

<body>
  <h1>My Portfolio</h1>

  <div class="section">
    <h2>Photos I've Clicked</h2>
    <div class="grid">
      <img src="photo1.jpg" alt="Photography 1">
      <img src="photo2.jpg" alt="Photography 2">
      <img src="photo3.jpg" alt="Photography 3">
    </div>
  </div>

  <div class="section">
    <h2>Videos I've Shot</h2>
    <div class="grid">
      <video src="video1.mp4" controls></video>
      <video src="video2.mp4" controls></video>
    </div>
  </div>

  <div class="section">
    <h2>Edits I've Done</h2>
    <div class="grid">
      <img src="edit1.jpg" alt="Edit 1">
      <img src="edit2.jpg" alt="Edit 2">
    </div>
  </div>
</body>

</html>
